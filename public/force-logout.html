<!DOCTYPE html>
<html>
<head>
    <title>Logout Forçado</title>
</head>
<body>
    <h1>Limpando cache...</h1>
    <script>
        // Limpar localStorage
        localStorage.clear();
        
        // Limpar sessionStorage
        sessionStorage.clear();
        
        // Redirecionar para login
        setTimeout(() => {
            window.location.href = '/login';
        }, 1000);
    </script>
</body>
</html>
