<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Monitor - MidiaFlow</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #00ffff; text-align: center; }
        .metric {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .metric h3 { 
            color: #00ffff; 
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .value {
            font-size: 24px;
            font-weight: bold;
            margin: 5px 0;
        }
        .good { color: #00ff00; }
        .warning { color: #ffff00; }
        .bad { color: #ff0000; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        button {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin: 20px 0;
            width: 100%;
        }
        button:hover { background: #00cccc; }
        .log {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry { margin: 5px 0; }
    </style>
</head>
<body>
    <h1>⚡ PERFORMANCE MONITOR - MIDIAFLOW</h1>
    
    <button onclick="runTests()">🚀 EXECUTAR TESTES</button>
    
    <div class="grid" id="metrics"></div>
    
    <div class="metric">
        <h3>📊 LOG DE TESTES</h3>
        <div class="log" id="log"></div>
    </div>

    <script>
        const API_URL = 'https://gdb962d234.execute-api.us-east-1.amazonaws.com/prod';
        const SITE_URL = 'https://midiaflow.sstechnologies-cloud.com';
        
        function log(msg) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function showMetric(title, value, unit, status) {
            const metricsDiv = document.getElementById('metrics');
            const metric = document.createElement('div');
            metric.className = 'metric';
            metric.innerHTML = `
                <h3>${title}</h3>
                <div class="value ${status}">${value}${unit}</div>
            `;
            metricsDiv.appendChild(metric);
        }
        
        async function measureEndpoint(url, name) {
            log(`Testando: ${name}...`);
            const times = [];
            
            for (let i = 0; i < 3; i++) {
                try {
                    const start = performance.now();
                    const response = await fetch(url, { cache: 'no-store' });
                    const elapsed = performance.now() - start;
                    times.push(elapsed);
                    log(`  ${name} #${i+1}: ${elapsed.toFixed(0)}ms (${response.status})`);
                    await new Promise(r => setTimeout(r, 500));
                } catch (e) {
                    log(`  ${name} #${i+1}: ERRO - ${e.message}`);
                }
            }
            
            if (times.length > 0) {
                const avg = times.reduce((a, b) => a + b) / times.length;
                const min = Math.min(...times);
                const max = Math.max(...times);
                
                let status = 'good';
                if (avg > 500) status = 'warning';
                if (avg > 1000) status = 'bad';
                
                showMetric(name, avg.toFixed(0), 'ms', status);
                log(`  ${name} - Média: ${avg.toFixed(0)}ms | Min: ${min.toFixed(0)}ms | Max: ${max.toFixed(0)}ms`);
                
                return avg;
            }
            return null;
        }
        
        async function runTests() {
            document.getElementById('metrics').innerHTML = '';
            document.getElementById('log').innerHTML = '';
            
            log('=== INICIANDO TESTES DE PERFORMANCE ===');
            
            // 1. Página inicial
            await measureEndpoint(SITE_URL, 'Página Inicial');
            
            // 2. Login page
            await measureEndpoint(`${SITE_URL}/login`, 'Página de Login');
            
            // 3. Dashboard (vai dar 404 mas mede o CloudFront)
            await measureEndpoint(`${SITE_URL}/dashboard`, 'Dashboard HTML');
            
            // 4. API Health
            await measureEndpoint(`${API_URL}/health`, 'API Health');
            
            // 5. Navigation Timing API
            if (performance.timing) {
                const timing = performance.timing;
                const pageLoad = timing.loadEventEnd - timing.navigationStart;
                const domReady = timing.domContentLoadedEventEnd - timing.navigationStart;
                const firstPaint = timing.responseStart - timing.navigationStart;
                
                showMetric('Page Load', pageLoad.toFixed(0), 'ms', pageLoad < 2000 ? 'good' : 'warning');
                showMetric('DOM Ready', domReady.toFixed(0), 'ms', domReady < 1500 ? 'good' : 'warning');
                showMetric('First Paint', firstPaint.toFixed(0), 'ms', firstPaint < 500 ? 'good' : 'warning');
                
                log(`Page Load: ${pageLoad}ms | DOM Ready: ${domReady}ms | First Paint: ${firstPaint}ms`);
            }
            
            // 6. Resource Timing
            const resources = performance.getEntriesByType('resource');
            const totalSize = resources.reduce((sum, r) => sum + (r.transferSize || 0), 0);
            const avgResourceTime = resources.length > 0 
                ? resources.reduce((sum, r) => sum + r.duration, 0) / resources.length 
                : 0;
            
            showMetric('Total Resources', resources.length, '', 'good');
            showMetric('Total Size', (totalSize / 1024).toFixed(1), 'KB', totalSize < 500000 ? 'good' : 'warning');
            showMetric('Avg Resource Time', avgResourceTime.toFixed(0), 'ms', avgResourceTime < 200 ? 'good' : 'warning');
            
            log(`Total de recursos: ${resources.length} | Tamanho total: ${(totalSize/1024).toFixed(1)}KB`);
            
            log('=== TESTES CONCLUÍDOS ===');
        }
        
        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runTests, 1000);
        });
    </script>
</body>
</html>
