<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Direto - Mediaflow</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .upload-area { 
            border: 2px dashed #00ffff; 
            padding: 40px; 
            text-align: center; 
            margin: 20px 0;
            background: #2a2a2a;
            border-radius: 10px;
        }
        .upload-area:hover { 
            background: #3a3a3a; 
        }
        input[type="file"] { 
            margin: 20px 0; 
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
        }
        button { 
            background: #00ffff; 
            color: black; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { 
            background: #00cccc; 
        }
        button:disabled { 
            background: #666; 
            cursor: not-allowed; 
        }
        .progress { 
            width: 100%; 
            height: 20px; 
            background: #333; 
            border-radius: 10px; 
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, #00ffff, #ff00ff); 
            width: 0%; 
            transition: width 0.3s;
        }
        .status { 
            margin: 10px 0; 
            padding: 10px;
            border-radius: 5px;
        }
        .success { background: #004400; color: #00ff00; }
        .error { background: #440000; color: #ff0000; }
        .info { background: #004444; color: #00ffff; }
    </style>
</head>
<body>
    <h1>🚀 Upload Direto - Mediaflow</h1>
    <p>Upload sem frontend - direto para AWS S3</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <h3>📁 Clique aqui ou arraste arquivos</h3>
        <p>Todos os tamanhos - Presigned URL</p>
    </div>
    
    <input type="file" id="fileInput" multiple style="display: none;">
    
    <div id="fileList"></div>
    
    <button id="uploadBtn" onclick="uploadAll()" disabled>📤 Upload Todos</button>
    
    <div id="status"></div>

    <script>
        let selectedFiles = [];
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files);
            displayFiles();
        });
        
        function displayFiles() {
            const fileList = document.getElementById('fileList');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                uploadBtn.disabled = true;
                return;
            }
            
            fileList.innerHTML = '<h3>Arquivos Selecionados:</h3>';
            selectedFiles.forEach((file, index) => {
                fileList.innerHTML += `
                    <div id="file-${index}" style="margin: 10px 0; padding: 10px; background: #333; border-radius: 5px;">
                        <strong>${file.name}</strong> (${formatFileSize(file.size)})
                        <div class="progress" id="progress-${index}" style="display: none;">
                            <div class="progress-bar" id="progressbar-${index}"></div>
                        </div>
                        <div id="status-${index}"></div>
                    </div>
                `;
            });
            
            uploadBtn.disabled = false;
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        async function uploadFile(file, index) {
            const statusDiv = document.getElementById(`status-${index}`);
            const progressDiv = document.getElementById(`progress-${index}`);
            const progressBar = document.getElementById(`progressbar-${index}`);
            
            try {
                statusDiv.innerHTML = '<span class="info">🔄 Obtendo URL...</span>';
                
                // 1. Obter URL presigned
                const urlResponse = await fetch('https://gdb962d234.execute-api.us-east-1.amazonaws.com/prod/upload/presigned', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: file.name,
                        contentType: file.type,
                        fileSize: file.size
                    })
                });
                
                const urlData = await urlResponse.json();
                
                if (!urlData.success) {
                    throw new Error(urlData.message || 'Falha ao obter URL');
                }
                
                statusDiv.innerHTML = '<span class="info">📤 Enviando...</span>';
                progressDiv.style.display = 'block';
                
                // 2. Upload para S3
                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    
                    xhr.upload.addEventListener('progress', (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            progressBar.style.width = percent + '%';
                        }
                    });
                    
                    xhr.addEventListener('load', () => {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            resolve();
                        } else {
                            reject(new Error(`HTTP ${xhr.status}: ${xhr.statusText}`));
                        }
                    });
                    
                    xhr.addEventListener('error', () => reject(new Error('Erro de rede')));
                    
                    xhr.open('PUT', urlData.uploadUrl);
                    xhr.setRequestHeader('Content-Type', file.type);
                    xhr.send(file);
                });
                
                statusDiv.innerHTML = '<span class="success">✅ Concluído!</span>';
                
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">❌ Erro: ${error.message}</span>`;
                progressDiv.style.display = 'none';
            }
        }
        
        async function uploadAll() {
            const uploadBtn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');
            
            uploadBtn.disabled = true;
            status.innerHTML = '<div class="info">🚀 Iniciando uploads...</div>';
            
            // Upload em paralelo (máximo 3)
            const batchSize = 3;
            for (let i = 0; i < selectedFiles.length; i += batchSize) {
                const batch = selectedFiles.slice(i, i + batchSize);
                await Promise.all(batch.map((file, batchIndex) => 
                    uploadFile(file, i + batchIndex)
                ));
            }
            
            status.innerHTML = '<div class="success">🎉 Todos os uploads concluídos!</div>';
            uploadBtn.disabled = false;
        }
        
        // Drag & Drop
        const uploadArea = document.querySelector('.upload-area');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#4a4a4a';
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#2a2a2a';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#2a2a2a';
            
            selectedFiles = Array.from(e.dataTransfer.files);
            displayFiles();
        });
    </script>
</body>
</html>
