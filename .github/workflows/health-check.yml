name: Health Check

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  health-check:
    name: Check System Health
    runs-on: ubuntu-latest
    steps:
      - name: Check Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://midiaflow.sstechnologies-cloud.com)
          if [ $response -ne 200 ]; then
            echo "❌ Frontend health check failed: HTTP $response"
            exit 1
          fi
          echo "✅ Frontend is healthy: HTTP $response"
      
      - name: Check API Gateway
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.NEXT_PUBLIC_API_URL }}/health || echo "000")
          if [ $response -eq 000 ] || [ $response -eq 404 ]; then
            echo "⚠️ API health endpoint not available"
          elif [ $response -ne 200 ]; then
            echo "❌ API health check failed: HTTP $response"
            exit 1
          else
            echo "✅ API is healthy: HTTP $response"
          fi
      
      - name: Summary
        if: success()
        run: |
          echo "✅ All systems operational"
          echo "🕐 Check time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
