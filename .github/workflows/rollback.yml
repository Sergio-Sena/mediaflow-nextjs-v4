name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Git commit SHA or tag to rollback to'
        required: true
        type: string

env:
  AWS_REGION: us-east-1

jobs:
  rollback:
    name: Rollback to Previous Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Application
        env:
          JWT_SECRET: ${{ inputs.environment == 'production' && secrets.JWT_SECRET || secrets.STAGING_JWT_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ inputs.environment == 'production' && secrets.NEXT_PUBLIC_API_URL || secrets.STAGING_API_URL }}
        run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to S3
        run: |
          BUCKET=${{ inputs.environment == 'production' && secrets.S3_BUCKET_FRONTEND || secrets.S3_BUCKET_STAGING }}
          aws s3 sync out/ s3://$BUCKET/ --delete
      
      - name: Invalidate CloudFront (Production only)
        if: inputs.environment == 'production'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
      
      - name: Rollback Summary
        run: |
          echo "✅ Rollback completed!"
          echo "🌍 Environment: ${{ inputs.environment }}"
          echo "📦 Version: ${{ inputs.version }}"
          echo "⏰ Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
