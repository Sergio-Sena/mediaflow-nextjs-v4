name: Deploy Simple

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: out/
          retention-days: 1

  deploy:
    name: Deploy to S3
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: out/
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Sync to S3
        run: |
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_FRONTEND }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_FRONTEND }}/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate"
      
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check Frontend
        run: |
          echo "Checking frontend..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://midiaflow.sstechnologies-cloud.com)
          echo "Frontend status: $response"
          if [ $response -ne 200 ]; then
            echo "Frontend health check failed"
            exit 1
          fi
          echo "Frontend is healthy!"
      
      - name: Check API
        run: |
          echo "Checking API..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://gdb962d234.execute-api.us-east-1.amazonaws.com/prod/users || echo "000")
          echo "API status: $response"
          if [ $response -eq 000 ]; then
            echo "API not reachable, skipping"
          else
            echo "API is reachable!"
          fi
      
      - name: Success
        run: |
          echo "Build successful!"
          echo "Health checks passed!"
          echo "Ready for deployment"
