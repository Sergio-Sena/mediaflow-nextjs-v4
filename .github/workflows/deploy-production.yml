name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Type check
        run: npm run type-check || npx tsc --noEmit

  build:
    name: Build Application
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: out/
          retention-days: 7

  deploy-frontend:
    name: Deploy Frontend to S3
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Clear S3 bucket (prevent stale chunks)
        run: |
          aws s3 rm s3://${{ secrets.S3_BUCKET_FRONTEND }}/ --recursive
      
      - name: Sync to S3
        run: |
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_FRONTEND }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"
          
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_FRONTEND }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"
      
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-lambdas:
    name: Deploy Lambda Functions
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda:
          - name: login
            path: aws-setup/lambda-functions/login.py
          - name: upload
            path: aws-setup/lambda-functions/upload.py
          - name: list-files
            path: aws-setup/lambda-functions/list-files.py
          - name: delete-file
            path: aws-setup/lambda-functions/delete-file.py
          - name: convert-video
            path: aws-setup/lambda-functions/convert-video.py
          - name: create-user
            path: aws-setup/lambda-functions/create-user.py
          - name: multipart-upload
            path: aws-setup/lambda-functions/multipart-upload.py
          - name: folder-operations
            path: aws-setup/lambda-functions/folder-operations.py
          - name: approve-user
            path: aws-setup/lambda-functions/approve-user.py
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Package Lambda
        run: |
          cd $(dirname ${{ matrix.lambda.path }})
          zip -r /tmp/${{ matrix.lambda.name }}.zip $(basename ${{ matrix.lambda.path }})
      
      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name midiaflow-${{ matrix.lambda.name }} \
            --zip-file fileb:///tmp/${{ matrix.lambda.name }}.zip
      
      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name midiaflow-${{ matrix.lambda.name }}

  health-check:
    name: Health Check
    needs: [deploy-frontend, deploy-lambdas]
    runs-on: ubuntu-latest
    steps:
      - name: Check Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://midiaflow.sstechnologies-cloud.com)
          if [ $response -ne 200 ]; then
            echo "Frontend health check failed with status $response"
            exit 1
          fi
          echo "Frontend is healthy (HTTP $response)"
      
      - name: Check API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.NEXT_PUBLIC_API_URL }}/health || echo "000")
          if [ $response -eq 000 ] || [ $response -eq 404 ]; then
            echo "API endpoint not available, skipping health check"
          elif [ $response -ne 200 ]; then
            echo "API health check failed with status $response"
            exit 1
          else
            echo "API is healthy (HTTP $response)"
          fi

  notify:
    name: Notify Deployment
    needs: health-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Success
        if: needs.health-check.result == 'success'
        run: |
          echo "Deployment successful!"
          echo "URL: https://midiaflow.sstechnologies-cloud.com"
          echo "Version: ${{ github.sha }}"
      
      - name: Deployment Failed
        if: needs.health-check.result != 'success'
        run: |
          echo "Deployment failed!"
          echo "Version: ${{ github.sha }}"
          exit 1
