  <text x="495" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">3 AI Insights</text>

  <text x="595" y="155" fill="#64748b" font-size="18">→</text>

  <rect x="610" y="125" width="170" height="55" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="695" y="150" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="bold">📧 SES Email</text>
  <text x="695" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">Relatório HTML</text>

  <text x="795" y="155" fill="#64748b" font-size="18">→</text>

  <rect x="810" y="125" width="170" height="55" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="895" y="150" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">👨‍💻 Engenheiro</text>
  <text x="895" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">Recebe na inbox</text>

