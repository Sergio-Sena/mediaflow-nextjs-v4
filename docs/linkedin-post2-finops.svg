  <text x="75" y="230" fill="#22d3ee" font-size="14" font-weight="bold">📊 MidiaFlow - Relatório FinOps</text>
  <text x="530" y="230" text-anchor="end" fill="#94a3b8" font-size="10">Deploy: ba00f828</text>

