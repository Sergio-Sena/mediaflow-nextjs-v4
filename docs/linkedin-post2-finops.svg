  <rect x="70" y="430" width="510" height="145" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="90" y="455" fill="#a78bfa" font-size="12" font-weight="bold">🤖 AI Insights (Bedrock Claude)</text>
  
  <text x="90" y="480" fill="#f8fafc" font-size="10">1. S3: migrar dados de acesso raro para Glacier (-40% storage)</text>
  <text x="90" y="505" fill="#f8fafc" font-size="10">2. Lambda: otimizar memory size das 17 funções (right-sizing)</text>
  <text x="90" y="530" fill="#f8fafc" font-size="10">3. DynamoDB: padrão de uso sugere provisioned mode (-40%)</text>
  
