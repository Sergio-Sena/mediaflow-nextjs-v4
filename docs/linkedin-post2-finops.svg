  <text x="690" y="285" fill="#22c55e" font-size="12">1.</text>
  <text x="710" y="285" fill="#f8fafc" font-size="12">Tagear TODOS os recursos com Project=MidiaFlow</text>

  <rect x="670" y="310" width="460" height="40" rx="5" fill="#0f172a"/>
  <text x="690" y="335" fill="#22c55e" font-size="12">2.</text>
  <text x="710" y="335" fill="#f8fafc" font-size="12">Ativar tag no Cost Explorer (cost allocation tags)</text>

  <rect x="670" y="360" width="460" height="40" rx="5" fill="#0f172a"/>
  <text x="690" y="385" fill="#22c55e" font-size="12">3.</text>
  <text x="710" y="385" fill="#f8fafc" font-size="12">Script Python: Cost Explorer → Bedrock → SES</text>

  <rect x="670" y="410" width="460" height="40" rx="5" fill="#0f172a"/>
  <text x="690" y="435" fill="#22c55e" font-size="12">4.</text>
  <text x="710" y="435" fill="#f8fafc" font-size="12">Adicionar step no GitHub Actions (após health-check)</text>

  <!-- Cost breakdown -->
  <text x="900" y="485" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">Custo do FinOps</text>

  <text x="690" y="515" fill="#94a3b8" font-size="12">Cost Explorer:</text>
  <text x="1100" y="515" text-anchor="end" fill="#22c55e" font-size="12">$0.00 (incluso)</text>

  <text x="690" y="540" fill="#94a3b8" font-size="12">Bedrock Claude 3 Haiku:</text>
  <text x="1100" y="540" text-anchor="end" fill="#22c55e" font-size="12">$0.005/relatório</text>

  <text x="690" y="565" fill="#94a3b8" font-size="12">SES Email:</text>
  <text x="1100" y="565" text-anchor="end" fill="#22c55e" font-size="12">$0.00 (free tier)</text>

  <line x1="690" y1="575" x2="1100" y2="575" stroke="#64748b" stroke-width="0.5"/>
  <text x="690" y="595" fill="#f8fafc" font-size="13" font-weight="bold">Total mensal (1 deploy/dia):</text>
  <text x="1100" y="595" text-anchor="end" fill="#22c55e" font-size="16" font-weight="bold">~$0.15/mês</text>

  <!-- Footer -->
  <text x="600" y="618" text-anchor="middle" fill="#64748b" font-size="11">AWS Cost Explorer • Bedrock Claude 3 Haiku • SES • GitHub Actions • Python • MidiaFlow v4.10</text>
