  <rect x="300" y="370" width="86" height="8" rx="3" fill="#22d3ee"/>
  <text x="450" y="380" fill="#22d3ee" font-size="11" font-weight="bold">$0.60</text>

  <text x="75" y="405" fill="#f8fafc" font-size="11">Amazon S3 Requests</text>
  <rect x="300" y="395" width="120" height="8" rx="3" fill="#0f172a"/>
  <rect x="300" y="395" width="33" height="8" rx="3" fill="#22d3ee"/>
  <text x="450" y="405" fill="#22d3ee" font-size="11" font-weight="bold">$0.23</text>

