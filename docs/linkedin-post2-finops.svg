  <text x="145" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">CUSTO (30 DIAS)</text>
  <text x="145" y="310" text-anchor="middle" fill="#22d3ee" font-size="24" font-weight="bold">$0.83</text>

