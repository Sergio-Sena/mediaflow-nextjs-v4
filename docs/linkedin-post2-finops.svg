  <text x="295" y="150" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">📊 Cost Explorer</text>
  <text x="295" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">Tag: Project=MidiaFlow</text>

  <text x="395" y="155" fill="#64748b" font-size="18">→</text>

