  <text x="720" y="285" text-anchor="middle" fill="#22c55e" font-size="18">🎬</text>
  <text x="720" y="310" text-anchor="middle" fill="#f8fafc" font-size="8">Tifa</text>

  <rect x="780" y="255" width="100" height="60" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="830" y="285" text-anchor="middle" fill="#22c55e" font-size="18">🎬</text>
  <text x="830" y="310" text-anchor="middle" fill="#f8fafc" font-size="8">Sadako</text>

  <rect x="890" y="255" width="100" height="60" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="940" y="285" text-anchor="middle" fill="#22c55e" font-size="18">🎬</text>
