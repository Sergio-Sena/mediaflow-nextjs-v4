  <text x="150" y="435" fill="#22d3ee" font-size="12">→</text>
  <text x="170" y="435" fill="#f8fafc" font-size="12">Setas laterais (somem quando não tem mais)</text>
  
  <text x="150" y="460" fill="#22d3ee" font-size="12">→</text>
  <text x="170" y="460" fill="#f8fafc" font-size="12">Cards com gradiente por tipo (roxo=vídeo, verde=imagem)</text>
  
  <text x="150" y="485" fill="#22d3ee" font-size="12">→</text>
  <text x="170" y="485" fill="#f8fafc" font-size="12">Hover: play + delete + share aparecem</text>
  
  <text x="150" y="510" fill="#22d3ee" font-size="12">→</text>
