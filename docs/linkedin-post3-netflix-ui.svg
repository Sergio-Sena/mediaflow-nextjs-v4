  <text x="670" y="460" fill="#f8fafc" font-size="12">Delete pasta inteira (1 clique)</text>
  
  <text x="650" y="485" fill="#22d3ee" font-size="12">→</text>
  <text x="670" y="485" fill="#f8fafc" font-size="12">Componente reutilizável (dashboard + público)</text>
  
  <text x="650" y="510" fill="#22d3ee" font-size="12">→</text>
  <text x="670" y="510" fill="#f8fafc" font-size="12">Zero libs externas (scroll nativo)</text>

