<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Arial, sans-serif">
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#22d3ee" font-size="26" font-weight="bold">🤖 6 AI Agents no Pipeline CI/CD</text>
  <text x="600" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">Auditoria automatizada antes de cada deploy — AWS Bedrock + GitHub Actions</text>

  <!-- Pipeline flow -->
  <rect x="30" y="100" width="100" height="50" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="80" y="130" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="bold">✅ Test</text>

  <text x="145" y="128" fill="#64748b" font-size="20">→</text>

  <rect x="160" y="100" width="140" height="50" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="230" y="125" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">🤖 AI AUDIT</text>
  <text x="230" y="142" text-anchor="middle" fill="#94a3b8" font-size="10">6 agentes</text>

  <text x="315" y="128" fill="#64748b" font-size="20">→</text>

  <rect x="330" y="100" width="100" height="50" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="380" y="130" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="bold">🔨 Build</text>

  <text x="445" y="128" fill="#64748b" font-size="20">→</text>

  <rect x="460" y="100" width="100" height="50" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="510" y="130" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="bold">🚀 Deploy</text>

  <text x="575" y="128" fill="#64748b" font-size="20">→</text>

  <rect x="590" y="100" width="100" height="50" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">💚 Health</text>

  <text x="705" y="128" fill="#64748b" font-size="20">→</text>

  <rect x="720" y="100" width="100" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="770" y="130" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">💰 FinOps</text>

  <!-- Agents section -->
  <text x="600" y="195" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">Time de Agentes Especializados</text>

  <!-- Agent cards -->
  <rect x="50" y="215" width="170" height="90" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="135" y="240" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">🔐 Security</text>
  <text x="135" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">Secrets expostos</text>
  <text x="135" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">IAM permissivo</text>
  <text x="135" y="290" text-anchor="middle" fill="#94a3b8" font-size="10">Missing encryption</text>

  <rect x="240" y="215" width="170" height="90" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="325" y="240" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">💰 FinOps</text>
  <text x="325" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">Right-sizing Lambda</text>
  <text x="325" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">Storage classes</text>
  <text x="325" y="290" text-anchor="middle" fill="#94a3b8" font-size="10">Idle resources</text>

  <rect x="430" y="215" width="170" height="90" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="515" y="240" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="bold">📝 Code Quality</text>
  <text x="515" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">Error handling</text>
  <text x="515" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">Hardcoded values</text>
  <text x="515" y="290" text-anchor="middle" fill="#94a3b8" font-size="10">Performance issues</text>

  <rect x="620" y="215" width="170" height="90" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="705" y="240" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">⚖️ Compliance</text>
  <text x="705" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">LGPD / GDPR</text>
  <text x="705" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">Data retention</text>
  <text x="705" y="290" text-anchor="middle" fill="#94a3b8" font-size="10">Consent mechanisms</text>

  <rect x="810" y="215" width="170" height="90" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="895" y="240" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">⚡ Performance</text>
  <text x="895" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">Cold starts</text>
  <text x="895" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">Connection reuse</text>
  <text x="895" y="290" text-anchor="middle" fill="#94a3b8" font-size="10">N+1 queries</text>

  <rect x="1000" y="215" width="170" height="90" rx="8" fill="#1e293b" stroke="#f8fafc" stroke-width="1.5"/>
  <text x="1085" y="240" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">👑 Leader</text>
  <text x="1085" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">Orquestra todos</text>
  <text x="1085" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">APPROVED ou</text>
  <text x="1085" y="290" text-anchor="middle" fill="#94a3b8" font-size="10">BLOCKED</text>

  <!-- Results section -->
  <rect x="50" y="340" width="1100" height="260" rx="10" fill="#1e293b"/>
  <text x="600" y="375" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">Primeiro Resultado da Auditoria</text>

  <!-- Findings -->
  <rect x="100" y="400" width="280" height="80" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="240" y="425" text-anchor="middle" fill="#ef4444" font-size="32" font-weight="bold">5</text>
  <text x="240" y="450" text-anchor="middle" fill="#94a3b8" font-size="13">Vulnerabilidades</text>
  <text x="240" y="468" text-anchor="middle" fill="#94a3b8" font-size="11">de segurança encontradas</text>

  <rect x="420" y="400" width="280" height="80" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="560" y="425" text-anchor="middle" fill="#f59e0b" font-size="32" font-weight="bold">2</text>
  <text x="560" y="450" text-anchor="middle" fill="#94a3b8" font-size="13">Otimizações de custo</text>
  <text x="560" y="468" text-anchor="middle" fill="#94a3b8" font-size="11">sugeridas pelo FinOps</text>

  <rect x="740" y="400" width="280" height="80" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="880" y="425" text-anchor="middle" fill="#22d3ee" font-size="32" font-weight="bold">4</text>
  <text x="880" y="450" text-anchor="middle" fill="#94a3b8" font-size="13">Issues de código</text>
  <text x="880" y="468" text-anchor="middle" fill="#94a3b8" font-size="11">corrigidas antes do deploy</text>

  <!-- Bottom stats -->
  <text x="240" y="530" text-anchor="middle" fill="#22c55e" font-size="28" font-weight="bold">$0.05</text>
  <text x="240" y="555" text-anchor="middle" fill="#94a3b8" font-size="12">por auditoria</text>

  <text x="560" y="530" text-anchor="middle" fill="#a78bfa" font-size="28" font-weight="bold">~30s</text>
  <text x="560" y="555" text-anchor="middle" fill="#94a3b8" font-size="12">tempo de execução</text>

  <text x="880" y="530" text-anchor="middle" fill="#22d3ee" font-size="28" font-weight="bold">100%</text>
  <text x="880" y="555" text-anchor="middle" fill="#94a3b8" font-size="12">automatizado</text>

  <!-- Footer -->
  <text x="600" y="610" text-anchor="middle" fill="#64748b" font-size="11">AWS Bedrock • Claude 3 Haiku • GitHub Actions • Python • MidiaFlow v4.10</text>
</svg>
